<!DOCTYPE html>
<html>
<head>
  <title>Mentor Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
  margin:0;
  padding:0;
}

/* Full height layout */
.container{
  max-width:100%;
  padding:0 10px;
}

/* Card full height on mobile */
.card{
  height:90vh;
  display:flex;
  flex-direction:column;
  border-radius:12px;
}

/* Chat box grow karega */
.chat-box{
  flex:1;
  overflow-y:auto;
  background:#f8f9fa;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* Message base */
.msg{
  max-width:80%;
  padding:10px 14px;
  margin:4px 0;
  border-radius:18px;
  font-size:14px;
  word-break:break-word;
}

/* Sent */
.sent{
  background:#0095f6;
  color:white;
  align-self:flex-end;
  border-bottom-right-radius:4px;
}

/* Received */
.received{
  background:#e4e6eb;
  color:black;
  align-self:flex-start;
  border-bottom-left-radius:4px;
}

/* Input fixed bottom style */
.input-group{
  padding-top:8px;
}

input{
  font-size:16px !important; /* prevents zoom on iPhone */
}

@media (max-width:576px){

  .card{
    height:100vh;
    border-radius:0;
  }

  h4{
    font-size:18px;
  }

  .msg{
    max-width:85%;
    font-size:13px;
  }

}

</style>
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card p-3 shadow">

    <h4>Mentor Chat</h4>

    <div id="chatBox" class="chat-box mt-3"></div>

    <div class="input-group mt-3">
      <input type="text" id="messageInput" class="form-control">
      <button class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="chat.js"></script>

</body>
</html>
