<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillXpress - Choose Your Path</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1495446815901-a7297e633e8d?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            font-family: var(--font-primary);
            padding: var(--spacing-md);
        }

        .role-selection-card {
            background: var(--background);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            padding: var(--spacing-2xl);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .brand-title {
            font-size: var(--font-size-4xl);
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: var(--spacing-sm);
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: var(--font-size-lg);
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xl);
            font-weight: 500;
        }

        .role-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
            margin-top: var(--spacing-xl);
        }

        .role-card {
            background: var(--background-secondary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            border: 1px solid var(--border-color);
            transition: all var(--transition-normal);
            cursor: pointer;
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .role-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-color);
        }

        .role-icon {
            font-size: var(--font-size-4xl);
            margin-bottom: var(--spacing-sm);
        }

        .role-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--primary-color);
        }

        .role-description {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            text-align: center;
        }

        @media (max-width: 768px) {
            .role-buttons {
                grid-template-columns: 1fr;
            }
            
            .role-selection-card {
                padding: var(--spacing-lg);
            }
            
            .brand-title {
                font-size: var(--font-size-3xl);
            }
        }
    </style>
</head>

<body>
    <div class="role-selection-card animate-fade-in-up">
        <h1 class="brand-title">SkillXpress</h1>
        <p class="tagline">Choose your path to success</p>
        
        <div class="role-buttons">
            <a href="choose.html" class="role-card">
                <div class="role-icon">👨‍🎓</div>
                <div class="role-title">Student</div>
                <div class="role-description">Build skills, track progress, get hired</div>
            </a>
            
            <a href="mentor-auth.html" class="role-card">
                <div class="role-icon">👨‍🏫</div>
                <div class="role-title">Mentor</div>
                <div class="role-description">Share knowledge, guide students, earn</div>
            </a>
        </div>
    </div>
</body>
</html>
