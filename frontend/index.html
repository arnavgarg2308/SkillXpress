<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillXpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            /* High-quality Study/Books background */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1495446815901-a7297e633e8d?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 15px;
        }

        .card {
            padding: 40px 30px;
            border-radius: 20px;
            /* Responsive width: full on mobile, fixed on desktop */
            width: 100%;
            max-width: 380px; 
            text-align: center;
            background: #ffffff;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h2 {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 5px;
        }

        p {
            color: #64748b;
            margin-bottom: 30px;
        }

        /* Forces buttons to stay stacked and full width */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Space between the two buttons */
        }

        .btn {
            padding: 14px;
            font-weight: 600;
            border-radius: 12px;
            font-size: 1.1rem;
            border: none;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: #4f46e5;
        }

        .btn-dark {
            background-color: #1e293b;
        }

        /* Mobile specific font adjustment */
        @media (max-width: 480px) {
            h2 { font-size: 1.6rem; }
            .card { padding: 30px 20px; }
        }
    </style>
</head>

<body>

<div class="card shadow">
    <h2>SkillXpress</h2>
    <p>Select your role</p>

    <div class="button-group">
        <button class="btn btn-primary w-100" onclick="location.href='choose.html'">
            👨‍🎓 Student
        </button>

        <button class="btn btn-dark w-100" onclick="location.href='mentor-auth.html'">
            👨‍🏫 Mentor
        </button>
    </div>
</div>

</body>
</html>
