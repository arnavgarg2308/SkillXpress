<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Login | SkillXpress</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      /* Background responsive setting */
      background: linear-gradient(rgba(99, 102, 241, .35), rgba(99, 102, 241, .35)),
      url('https://images.unsplash.com/photo-1519389950473-47ba0277781c');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 15px; /* Mobile par screen edges se gap ke liye */
      margin: 0;
    }

    .auth-card {
      background: rgba(255, 255, 255, .95);
      backdrop-filter: blur(8px);
      padding: 2rem;
      border-radius: 20px;
      width: 100%; /* Mobile par full width lega */
      max-width: 420px; /* Badi screen par 420px par ruk jayega */
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    .form-control {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .form-control:focus {
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      border-color: #6366f1;
    }

    .btn {
      padding: 12px;
      border-radius: 10px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .hidden {
      display: none;
    }

    /* Mobile specific adjustments */
    @media (max-width: 480px) {
      .auth-card {
        padding: 1.5rem;
      }
      h3 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>

  <div class="auth-card">
    <div id="mentorSignin">
      <h3 class="text-center mb-3 fw-bold">Mentor Sign In</h3>
      <p class="text-center text-muted small mb-4">Welcome back! Please enter your details.</p>

      <input id="mLoginEmail" class="form-control mb-3" placeholder="Email">
      <input id="mLoginPass" type="password" class="form-control mb-3" placeholder="Password">

      <button class="btn btn-primary w-100" onclick="mentorSignin()">
        Sign In
      </button>

      <p class="text-center mt-3 mb-0">
        New Mentor? <a href="#" class="text-decoration-none fw-bold" onclick="showSignup()">Create Account</a>
      </p>
    </div>

    <div id="mentorSignup" class="hidden">
      <h3 class="text-center mb-3 fw-bold">Mentor Signup</h3>
      <p class="text-center text-muted small mb-4">Join our community of expert mentors.</p>

      <input id="mName" class="form-control mb-2" placeholder="Full Name *">
      <input id="mEmail" class="form-control mb-2" placeholder="Email *">
      <input id="mPass" type="password" class="form-control mb-2" placeholder="Password *">
      <input id="mCode" class="form-control mb-2" placeholder="Mentor Access Code *">
      <input id="mExpertise" class="form-control mb-2" placeholder="Short Bio/Description">
      <textarea id="mDesc" class="form-control mb-3" rows="3" placeholder="Experties *"></textarea>

      <button class="btn btn-success w-100" onclick="mentorSignup()">
        Sign Up
      </button>

      <p class="text-center mt-3 mb-0">
        Already a mentor? <a href="#" class="text-decoration-none fw-bold" onclick="showSignin()">Sign In</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>

  <script>
    /* SCREEN SWITCH LOGIC */
    function showSignup() {
      document.getElementById("mentorSignin").classList.add("hidden");
      document.getElementById("mentorSignup").classList.remove("hidden");
    }

    function showSignin() {
      document.getElementById("mentorSignup").classList.add("hidden");
      document.getElementById("mentorSignin").classList.remove("hidden");
    }

    /* MENTOR SIGNUP (EDGE FUNCTION) */
    async function mentorSignup() {
      const name = document.getElementById("mName").value.trim();
      const email = document.getElementById("mEmail").value.trim();
      const code = document.getElementById("mCode").value.trim();
      const password = document.getElementById("mPass").value.trim();
      const expertise = document.getElementById("mExpertise").value.trim();
      const description = document.getElementById("mDesc").value.trim();
const SECRET_CODE = "SKILLXPRESSMENTOR26";

      if(!name || !email || !password || !description) {
        alert("Please fill all required fields");
        return;
      }
if (code !== SECRET_CODE) {
  alert("Invalid mentor access code");
  return;
}
      const response = await fetch(
        "https://ltxrynmhihxmmzrnnduw.supabase.co/functions/v1/create-mentor", 
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password, expertise, description })
        }
      );

      const result = await response.json();

      if (result.error) {
        alert(result.error);
        return;
      }

      alert("Mentor account created successfully");
      showSignin();
    }

    /* MENTOR LOGIN */
    async function mentorSignin() {
      const email = document.getElementById("mLoginEmail").value;
      const password = document.getElementById("mLoginPass").value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert(error.message);
        return;
      }

      /* ONLY MENTOR LOGIN CHECK */
      const { data: mentor, error: mentorError } = await supabaseClient
        .from("mentors")
        .select("*")
        .eq("email", data.user.email)
        .maybeSingle();

      if (!mentor) {
        alert("Only mentors allowed");
        await supabaseClient.auth.signOut();
        return;
      }

      window.location.href = "mentor-dashboard.html";
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
