<!DOCTYPE html>
<html>
<head>
  <title>Mentor Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f3f4f6;
}

.row{
  height:100vh;
}

/* Sidebar */
.sidebar{
  background:white;
  border-right:1px solid #ddd;
  overflow-y:auto;
}

.user-item{
  padding:12px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}

.user-item:hover{
  background:#f1f5f9;
}

/* Chat Area */
.chat-area{
  display:flex;
  flex-direction:column;
  background:#f8f9fa;
  padding:15px;
}

/* Chat Box */
.chat-box{
  flex:1;
  overflow-y:auto;
  background:#fff;
  padding:15px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

/* Messages */
.msg{
  max-width:80%;
  padding:10px 14px;
  margin:5px 0;
  border-radius:18px;
  font-size:14px;
  word-break:break-word;
}

.sent{
  background:#0095f6;
  color:white;
  align-self:flex-end;
  border-bottom-right-radius:4px;
}

.received{
  background:#e4e6eb;
  color:black;
  align-self:flex-start;
  border-bottom-left-radius:4px;
}

input{
  font-size:16px !important;
}

/* MOBILE */
@media (max-width:768px){

  .row{
    flex-direction:column;
  }

  .sidebar{
    height:35vh;
    border-right:none;
    border-bottom:1px solid #ddd;
  }

  .chat-area{
    height:65vh;
    padding:10px;
  }

}
</style>
</head>

<body>

<div class="row g-0 vh-100">

  <!-- LEFT USERS LIST (Supabase se load honge) -->
  <div class="col-12 col-md-4 sidebar">

    <h5 class="p-3 border-bottom">Chats</h5>
    <p style="color:#6b7280;font-size:13px;padding:0 15px 10px 15px;">
⚠️ Chats are automatically deleted after 3 days.
</p>

    <div id="userList">
      <!-- Users dynamically load honge -->
    </div>

  </div>

  <!-- RIGHT CHAT AREA -->
  <div class="col-12 col-md-8 chat-area">

    <h5 id="chatUserName">Select User</h5>

    <div id="mentorChatBox" class="chat-box mt-3"></div>

    <div class="input-group mt-3">
      <input type="text" id="mentorMessage" class="form-control" placeholder="Type message...">
      <button type="button" class="btn btn-primary" onclick="sendMentorMessage()">Send</button>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="mentor-dashboard.js"></script>

</body>
</html>
